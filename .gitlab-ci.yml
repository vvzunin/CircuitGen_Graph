workflow:
  rules:
    - if: $CI_COMMIT_MESSAGE =~ /\[skip ci\]/i
      when: never
    # No pipeline for draft MRs (GitLab flag or "Draft:" title prefix).
    - if: $CI_PIPELINE_SOURCE == "merge_request_event" && $CI_MERGE_REQUEST_DRAFT == "true"
      when: never
    - if: $CI_PIPELINE_SOURCE == "merge_request_event" && $CI_MERGE_REQUEST_TITLE =~ /^Draft:/
      when: never
    - if: $CI_COMMIT_TAG
      variables:
        DOCKER_CI_TAG: $CI_COMMIT_TAG
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
      variables:
        DOCKER_CI_TAG: "mr-$CI_MERGE_REQUEST_IID-$CI_COMMIT_SHORT_SHA"
    - if: $CI_COMMIT_BRANCH
      variables:
        DOCKER_CI_TAG: $CI_COMMIT_REF_SLUG
    - when: always
      variables:
        DOCKER_CI_TAG: $CI_COMMIT_REF_SLUG

stages:
  # Проверка согласованности .gitlab-ci.yml с матрицей ОС (generate-gitlab-os-matrix.sh --check).
  - validate
  # Сборка базовых образов CI/dev для Ubuntu 24.04 — источник $DOCKER_CI_IMAGE для lint/check/test.
  - docker-ubuntu
  # Линт, cppcheck, санитайзеры и прочие проверки в образе CI по умолчанию.
  - check
  # Юнит-тесты, покрытие и примеры в образе CI по умолчанию.
  - test
  # Образы Docker для остальных ОС из матрицы и release-слои (после успешных тестов на Ubuntu).
  - docker-matrix
  # Те же проверки (lint, static-analysis, …) по вторичным ОС — только MR / default / теги (см. .secondary-os-matrix-rules).
  - check-os
  # Тесты и примеры по вторичным ОС — только MR / default / теги.
  - test-os
  # Полная проверка install-deps и сценариев на «чистых» образах ОС (os-image-build-push + os-full-check).
  - os-check
  # Сборка документации (Doxygen/m.css, PDF и т.д.).
  - docs
  # Создание GitLab Release для тегов версий.
  - release

variables:
  DOCKERFILE_CI_NAME: dockerfile/Dockerfile.ci
  DOCKERFILE_DEV_NAME: dockerfile/Dockerfile.dev
  DOCKERFILE_RELEASE_NAME: dockerfile/Dockerfile.release
  DOCKER_CI_SYSTEM: ubuntu:22.04
  DOCKER_CI_TAG: $CI_COMMIT_REF_SLUG
  REGISTRY_URL: vvzunin.me:5201
  # Optional CI/CD variable: HARBOR_WEB_UI_URL — HTTPS URL of Harbor web UI (not the Docker endpoint on :5201); used by release-from-tag.
  GROUP_NAME: circuitgen
  REPO_NAME: graph
  DOCKER_URL: $REGISTRY_URL/$GROUP_NAME/$REPO_NAME
  DOCKER_CI_IMAGE: $DOCKER_URL/ubuntu-24.04/ci:$DOCKER_CI_TAG
  DOCKER_DEV_IMAGE: $DOCKER_URL/ubuntu-24.04/dev:$DOCKER_CI_TAG
  DOCKER_RELEASE_IMAGE: $DOCKER_URL/ubuntu-24.04/release:$DOCKER_CI_TAG
  FF_NETWORK_PER_BUILD: "1"

# Generated sections in this file (markers) must match scripts/config/supported-os.sh (see generate-gitlab-os-matrix.sh).
#
# Jobs using docker:* + docker:*-dind need GitLab Runner with privileged=true (Docker executor).
gitlab-os-matrix-check:
  stage: validate
  image: debian:bookworm-slim
  script:
    - bash scripts/ci/generate-gitlab-os-matrix.sh --check
  rules:
    - if: $CI_COMMIT_TAG == null
  tags:
    - docker

.docker-images-base:
  image: docker:27
  services:
    - docker:27-dind
  variables:
    DOCKER_HOST: tcp://docker:2375
    DOCKER_TLS_CERTDIR: ""
    DOCKER_CI_IMAGE: $DOCKER_URL/$IMAGE_OS_SUFFIX/ci:$DOCKER_CI_TAG
    DOCKER_DEV_IMAGE: $DOCKER_URL/$IMAGE_OS_SUFFIX/dev:$DOCKER_CI_TAG
    DOCKER_RELEASE_IMAGE: $DOCKER_URL/$IMAGE_OS_SUFFIX/release:$DOCKER_CI_TAG
  before_script:
    - apk add --no-cache bash git
    - bash scripts/ci/docker-registry-login.sh
  script:
    - bash scripts/ci/docker-build-ci.sh
    - bash scripts/ci/docker-build-dev.sh
  rules:
    # MR pipelines do not set CI_COMMIT_BRANCH; only merge_request_event matches them.
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_COMMIT_BRANCH
    - if: $CI_COMMIT_TAG
  tags:
    - docker

# Secondary OS images + matrix (docker-images-* except 24.04, lint-os-*, …): skip plain
# feature-branch push pipelines; run on merge requests, default branch, and tags.
.secondary-os-matrix-rules:
  rules:
    - if: $CI_COMMIT_TAG
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH

docker-images-ubuntu-24.04:
  extends: .docker-images-base
  stage: docker-ubuntu
  variables:
    TARGET_OS: ubuntu-24.04
    DOCKER_CI_SYSTEM: ubuntu:24.04
    IMAGE_OS_SUFFIX: ubuntu-24.04

# BEGIN generated: docker-images jobs (generate-gitlab-os-matrix.sh)
docker-images-ubuntu-22.04:
  stage: docker-matrix
  extends:
    - .docker-images-base
    - .secondary-os-matrix-rules
  needs:
    - job: docker-images-ubuntu-24.04
      artifacts: false
    - job: tests
      artifacts: false
    - job: examples
      artifacts: false
  variables:
    TARGET_OS: ubuntu-22.04
    DOCKER_CI_SYSTEM: ubuntu:22.04
    IMAGE_OS_SUFFIX: ubuntu-22.04

