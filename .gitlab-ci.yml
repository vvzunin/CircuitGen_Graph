.ci-cmake-job:
  image: $DOCKER_CI_IMAGE
  tags:
    - docker

.os-setup-check-job:
  stage: os-check
  # Full image build (--no-cache) + run-all (lint…docs) can exceed 1h on some OS runners.
  timeout: 3h
  image: docker:27
  services:
    - docker:27-dind
  variables:
    DOCKER_HOST: tcp://docker:2375
    DOCKER_TLS_CERTDIR: ""
  before_script:
    - apk add --no-cache bash
    - bash scripts/ci/docker-registry-login.sh
  script:
    - bash scripts/ci/os-image-build-push.sh
    - bash scripts/ci/os-full-check.sh
  rules:
    - if: $CI_COMMIT_TAG == null
  tags:
    - docker

# BEGIN generated: os-system-validation-main jobs (generate-gitlab-os-matrix.sh)
os-system-validation-main-ubuntu-22.04:
  extends: .os-setup-check-job
  variables:
    TARGET_OS: ubuntu-22.04
  rules:
    - if: ($CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH) && ($CI_COMMIT_TAG == null)
      when: manual

os-system-validation-main-ubuntu-24.04:
  extends: .os-setup-check-job
  variables:
    TARGET_OS: ubuntu-24.04
  rules:
    - if: ($CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH) && ($CI_COMMIT_TAG == null)
      when: manual

os-system-validation-main-fedora-43:
  extends: .os-setup-check-job
  variables:
    TARGET_OS: fedora-43
  rules:
    - if: ($CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH) && ($CI_COMMIT_TAG == null)
      when: manual
# END generated: os-system-validation-main jobs (generate-gitlab-os-matrix.sh)

