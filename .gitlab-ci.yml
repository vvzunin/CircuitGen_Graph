docs:
  stage: docs
  extends: .ci-cmake-job
  variables:
    DOCKER_CI_IMAGE: $DOCKER_URL/ubuntu-24.04/ci:$DOCKER_CI_TAG
  needs:
    - job: docker-images-ubuntu-24.04
      artifacts: false
    - job: coverage
      artifacts: false
    - job: tests
      artifacts: false
    - job: examples
      artifacts: false
  dependencies: []
  before_script:
    - python3 --version
  script:
    - bash scripts/ci/docs.sh
  after_script:
    - |
      if [ -n "${CI_COMMIT_TAG:-}" ]; then
        tar czf "docs_${CI_COMMIT_TAG}.tar.gz" -C build docs
      else
        tar czf docs_latest.tar.gz -C build docs
      fi
  artifacts:
    when: always
    paths:
      - '*.tar.gz'
  rules:
    - if: $CI_COMMIT_MESSAGE =~ /\[skip ci\]/i
      when: never
    - if: $CI_COMMIT_TAG
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
      changes:
        - docs/**/*
        - cmake/**/*
        - scripts/ci/docs.sh
        - cmake/docs-ci.cmake
        - scripts/setup/install-deps-*.sh
        - README.md

release-from-tag:
  stage: release
  image: registry.gitlab.com/gitlab-org/release-cli:latest
  before_script:
    - apk add --no-cache bash
  script:
    - bash scripts/ci/create-gitlab-release.sh
  tags:
    - docker
  rules:
    - if: $CI_COMMIT_TAG
