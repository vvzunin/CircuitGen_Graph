  needs:
    - job: docker-images-ubuntu-24.04
      artifacts: false
    - job: lint
      artifacts: false
    - job: sanitize
      artifacts: false
    - job: static-analysis
      artifacts: false
  dependencies: []
  coverage: '/TOTAL_COVERAGE=([0-9]+(?:\.[0-9]+)?)%/'
